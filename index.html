<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoTech - Umidade</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1729;
      color: #e8eef7;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: #8a9bb3; font-size: 0.85rem; margin-bottom: 20px; }
    .card {
      background: #1a2540;
      border: 1px solid #2a3a5c;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title { font-size: 0.8rem; color: #8a9bb3; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .valor { font-size: 3rem; font-weight: 700; color: #4ade80; }
    .valor .pct { font-size: 1.5rem; }
    .data { font-size: 0.85rem; color: #8a9bb3; margin-top: 4px; }
    .status { font-size: 0.8rem; margin-top: 12px; }
    .ok { color: #4ade80; }
    .erro { color: #f87171; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #2a3a5c; }
    th { color: #8a9bb3; font-weight: 600; font-size: 0.8rem; }
    .config { background: #1a2540; border: 1px solid #2a3a5c; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .config label { display: block; font-size: 0.8rem; color: #8a9bb3; margin-bottom: 6px; }
    .config input {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid #2a3a5c; background: #0f1729; color: #e8eef7;
      font-size: 0.9rem;
    }
    .config button {
      margin-top: 10px; padding: 10px 16px; border: none; border-radius: 8px;
      background: #4ade80; color: #0f1729; font-weight: 600; cursor: pointer;
      font-size: 0.9rem;
    }
    .config button:hover { background: #3ec46f; }
    .empty { color: #8a9bb3; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>EcoTech — Umidade</h1>
    <p class="sub">Captando dados da API a cada 5 segundos</p>

    <div class="config">
      <label for="url">Endereço da API</label>
      <input id="url" type="text" value="" />
      <button onclick="salvarUrl()">Conectar</button>
    </div>

    <div class="card">
      <div class="card-title">Umidade atual</div>
      <div class="valor"><span id="atual">--</span><span class="pct">%</span></div>
      <div class="data" id="dataAtual"></div>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <div class="card-title">Histórico</div>
      <div id="historico"><p class="empty">Aguardando dados...</p></div>
    </div>
  </div>

  <script>
    let API_BASE_URL = "http://192.168.0.110:5000";

    function salvarUrl() {
      API_BASE_URL = document.getElementById("url").value.trim();
      buscarDados();
    }

    async function buscarUltima() {
      const res = await fetch(`${API_BASE_URL}/ultima`);
      if (!res.ok) throw new Error("sem dados");
      return res.json();
    }

    async function buscarTodos() {
      const res = await fetch(`${API_BASE_URL}/dados`);
      if (!res.ok) throw new Error("erro ao buscar");
      return res.json();
    }

    async function buscarDados() {
      const status = document.getElementById("status");
      try {
        const ultima = await buscarUltima();
        document.getElementById("atual").textContent = ultima.umidade;
        document.getElementById("dataAtual").textContent = ultima.data_hora;

        const todos = await buscarTodos();
        renderHistorico(todos);

        status.textContent = "● Conectado";
        status.className = "status ok";
      } catch (e) {
        status.textContent = "● Sem conexão com a API (" + API_BASE_URL + ")";
        status.className = "status erro";
      }
    }

    function renderHistorico(dados) {
      const div = document.getElementById("historico");
      if (!dados || dados.length === 0) {
        div.innerHTML = '<p class="empty">Nenhuma leitura ainda.</p>';
        return;
      }
      const ultimos = dados.slice(-10).reverse();
      let html = "<table><thead><tr><th>Data / Hora</th><th>Umidade</th></tr></thead><tbody>";
      for (const linha of ultimos) {
        html += `<tr><td>${linha.data_hora}</td><td>${linha.umidade}%</td></tr>`;
      }
      html += "</tbody></table>";
      div.innerHTML = html;
    }

    buscarDados();
    setInterval(buscarDados, 5000);
  </script>
</body>
</html>
